<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      html{
        font-family: "Merriweather", serif;
      }
      body{
        background-color: rgba(216, 218, 226, 1);
      }

      .flex{
        display: flex;
        gap: 5px;
        align-items: center;
      }

      .space-between{
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 10px;
        p{
            font-weight: 500;
            font-size: 24px;
            font-family: "Poppins", sans-serif;
        }
        span{
            font-weight: 500;
            font-size: 16px;
            font-family: "Poppins", sans-serif;
        }
      }

      .container{
        position: relative;
      }
      
      
      .collections{
        background-color: rgba(239, 240, 241, 1);
        padding: 62px;
        margin: auto;
        margin-top:  120px;
        border-radius: 26px;
        width: 1560px;
        z-index: 2;
        position: relative;
        box-shadow: 0px 25px 60px rgba(6, 27, 82, 0.1);
        
      }

      .collections-title{
        h2{
            font-weight: 700;
            font-size: 32px;
        }
        ul{
            margin-top: 20px;
        }
        li{
            padding: 10px;
            background-color: #ffffff;
            border-radius: 8px;
        }
      }

      .box-car{
        margin-top: 20px;
        display: flex;
        justify-content: space-between;
        gap: 64px;

        .box-model{
            background-color: #ffffff;
            padding: 24px;
            border-radius: 32px;
        img{
            overflow: hidden;
        }

        }
      }
      
      .cricle-1{
        width: 400px;
        height: 400px;
        border-radius: 50%;
        position: absolute;
        background-color: rgba(229, 231, 240, 1);
        z-index: -1;
       top: -120px;
        right: 550px;
        opacity: 0.6;
      }

      
      .cricle-2{
        width: 400px;
        height: 400px;
        border-radius: 50%;
        position: absolute;
        background-color: rgba(229, 231, 240, 1);
        z-index: -1;
       bottom: -120px;
        left: 500px;
        opacity: 0.6;
      }
      

    </style>
  </head>
  <body>
    <div class="container">
    <div class="cricle-1"></div>
    <div class="cricle-2"></div>
      <div class="collections">
        <div class="collections-title">
          <h2>Popular Collections</h2>
          <ul class="flex">
            <li>Profile</li>
            <li>New York</li>
            <li>Relaxing</li>
            <li>Person</li>
            <li>Fashion</li>
          </ul>
        </div>

       <div class="box-car">
            <div class="box-model">
                <img src="images/Rectangle 1.jpg" alt="">
                     <div class="space-between" >
                        <img src="./images/Rectangle 2.png" alt="">
                        <img src="./images/Frame 14.png" alt="">
                        <img src="./images/Frame 15.png" alt="">
                    </div>

                <div class="space-between" >
                    <p>People</p>
                    <div class="flex">
                        <img src="images/Frame.png" alt="">
                        <span>144</span>
                    </div>
                </div>
            </div>

             <div class="box-model">
                <img src="images/Rectangle 1.png" alt="">
                     <div class="space-between" >
                        <img src="./images/Rectangle 2 (1).png" alt="">
                        <img src="./images/Rectangle 3.png" alt="">
                        <img src="./images/Rectangle 4.png" alt="">
                    </div>

                <div class="space-between" >
                    <p>Nature</p>
                    <div class="flex">
                        <img src="images/Frame.png" alt="">
                        <span>7K</span>
                    </div>
                </div>
            </div>
            
            <div class="box-model">
                <img src="./images/Rectangle 5.png" alt="">
                     <div class="space-between" >
                        <img src="./images/Rectangle 6.png" alt="">
                        <img src="./images/Rectangle 7.png" alt="">
                        <img src="./images/Rectangle 8.png" alt="">
                    </div>

                <div class="space-between" >
                    <p>History</p>
                    <div class="flex">
                        <img src="images/Frame.png" alt="">
                        <span>431</span>
                    </div>
                </div>
            </div>



      
        </div>

      </div>
      
    </div>
  </body>
</html>
