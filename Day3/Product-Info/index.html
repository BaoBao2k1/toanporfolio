<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pro-duct-info</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        font-family: "Poppins", sans-serif;
      }

      .Product-container {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background-color: rgba(238, 242, 249, 1);
      }

      .product-text {
        display: inherit;
        background-color: #ffffff;
        padding: 74px;
        border-radius: 16px;
        gap: 40px;
      }

      .Proct-title p {
        display: inline-block;
        padding: 8px 16px;
        background-color: #191847;
        color: #ffffff;
        border-radius: 20px;
        font-size: 14px;
      }

      .Proct-title h2 {
        font-size: 24px;
        font-weight: 600px;
        color: #191847;
        margin-top: 10px;
      }

      .Product-price {
        margin-top: 10px;
        span {
          display: block;
          color: #8b8b8b;
          font-size: 14px;
        }
        .Price-decoration {
          text-decoration: line-through;
          font-size: 18px;
          font-weight: 400;
          color: #191847;
        }
        .Price {
          font-weight: 700;
          color: #191847;
          font-size: 48px;
        }
      }

      .btn-primary {
        background-color: rgba(71, 136, 233, 1);
        padding: 16px;
        border: none;
        color: #ffffff;
        font-weight: 500;
        font-size: 18px;
        border-radius: 8px;
        width: 100%;
        margin-top: 10px;
        box-shadow: 0px 8px rgba(28, 87, 238, 1);
      }

      .Product-stock {
        display: flex;
        gap: 10px;
        margin-top: 20px;
        i {
          color: rgba(0, 217, 139, 1);
        }
        span {
          font-weight: 400;
          font-size: 14px;
          color: black;
        }
      }

      .Product-detail {
        margin-top: 20px;
        display: flex;
        gap: 16px;
       
      }
      .btn-detail {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 14px ;
        background-color: #ffffff;
        border-radius: 8px;
        border: 2px solid #e5e8f0;
        i{
        font-size: 18px;
       }
      }
      
    </style>
  </head>
  <body>
    <div class="Product-container">
      <div class="product-text">
        <div class="product-img">
          <img src="./images/image 1.png" alt="" />
        </div>

        <div class="Product-info">
          <div class="Proct-title">
            <p>Free shipping</p>
            <h2>
              Razer Kraken Kitty Edt Gaming <br />
              Headset Quartz
            </h2>
          </div>
          <div class="Product-price">
            <span class="Price-decoration">1.599.000</span>
            <span class="Price">799.000</span>
            <span
              >The offer is valid until April 3 or as long as stock lasts!</span
            >
          </div>

          <button class="btn-primary">Add to cart</button>

          <div class="Product-stock">
            <i class="fa-sharp fa-solid fa-circle"></i>
            <span>50+ pcs. in stock.</span>
          </div>

          <div class="Product-detail">
            <button class="btn-detail">
              <i class="fas fa-balance-scale"></i>Add to cart
            </button>
            <button class="btn-detail">
              <i class="fa-regular fa-heart"></i>
              Add to wishlist
            </button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
