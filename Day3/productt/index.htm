<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProDuct Blog</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <section class="container">
        <div class="product-section">
          <div class="product-info">
            <div class="product-img">
              <img src="./images/image 1.png" alt="images 1.png" />
            </div>
            <div class="product-text">
              <div class="title">
                <p class="product-shoping">Free shipping</p>
                <h2>
                  Razer Karaken Kitty Edt Gaming <br />
                  Headset Quatz
                </h2>
              </div>
              <div class="product-price">
                <p><s>1,599,000</s></p>
                <p class="price">799,000</p>
                <span
                  >The offer is valid until April 3 or as long as stock
                  lasts!</span
                >
              </div>
              <div class="product-button">
                <button class="product-car">Add to cart</button>
              </div>
              <div class="product-stock">
                <span class="stock-dot"></span>
                <span class="stock-text">50+ pcs. in stock.</span>
              </div>
              <div class="product-social">
                <button class="button-call">
                  <img src="./images/Frame 1.svg" alt="" />
                  <span>Add to cart</span>
                </button>

                <button class="button-call">
                  <img src="./images/Vector.svg" alt="" />
                  <span>Add to cart</span>
                </button>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
